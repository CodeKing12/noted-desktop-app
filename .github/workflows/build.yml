name: Build & Package

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        default: 'windows'
        type: choice
        options:
          - windows
          - macos
          - linux
          - all

jobs:
  build-windows:
    if: ${{ inputs.platform == 'windows' || inputs.platform == 'all' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack & install dependencies
        run: |
          corepack enable
          yarn install --immutable

      - name: Build
        run: yarn run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noted-windows
          path: dist/noted-win-*.exe
          if-no-files-found: error

  build-macos:
    if: ${{ inputs.platform == 'macos' || inputs.platform == 'all' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack & install dependencies
        run: |
          corepack enable
          yarn install --immutable

      - name: Build
        run: yarn run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noted-macos
          path: dist/*.dmg
          if-no-files-found: error

  build-linux:
    if: ${{ inputs.platform == 'linux' || inputs.platform == 'all' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack & install dependencies
        run: |
          corepack enable
          yarn install --immutable

      - name: Build
        run: yarn run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noted-linux
          path: dist/*.AppImage
          if-no-files-found: error
